# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on: # Trigger events
  push:  
    branches: 
        - '**' # any branch
    paths:
       - "src/**"  # all file in this pass trigger pipeline
  pull_request:
     types: 
       - opened
       - closed

jobs:
  build:
    runs-on: ubuntu-latest # GitHub will create a temporary Ubuntu Linux machine to run the job.

    steps:
    - name: Print a welcome message
      run: echo "Welcome to our Github Actions Workflow!"
       
    - name: Checkout repository
      uses: actions/checkout@v4
   
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: |
         mvn clean
         mvn -B package --file pom.xml
      
    - name: Compile & Test
      run: mvn -q verify

    - name: Generate test report
      run: mvn surefire-report:report

    - name: Upload test report
      uses: actions/upload-artifact@v7.0.0
      with:
        name: test-report
        path: target/reports/surefire.html
      

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
