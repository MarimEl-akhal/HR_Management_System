
name: Java CI/CD with Maven

on: # Trigger events
  push:  
    branches: 
        - '**' # any branch
    paths:
       - "src/**"  # all file in this pass trigger pipeline
  pull_request:
     types: 
       - opened
       - closed

jobs:
  build:
    runs-on: ubuntu-latest # GitHub will create a temporary Ubuntu Linux machine to run the job.

    steps:
    
    - name: Print a welcome message
      run: echo "Welcome to our Github Actions Workflow!"
       
    - name: Checkout repository
      uses: actions/checkout@v4
   
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

 
    - name: Cache Maven dependencies  # restore dependencies if needs
      uses: actions/cache@v5.0.3
      with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
        
    - name: Build with Maven
      run: |
         mvn clean
         mvn -B package --file pom.xml
      
    - name: Compile & Test
      run: mvn -q verify

    - name: Generate test report
      run: mvn surefire-report:report

    - name: Upload test report
      uses: actions/upload-artifact@v7.0.0
      with:
        name: test-report
        path: target/reports/surefire.html 
        
